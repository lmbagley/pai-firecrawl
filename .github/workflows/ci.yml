name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dev dependencies
        run: bun install
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun test
